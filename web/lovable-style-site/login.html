<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>certAIn | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="login">
    <canvas class="starfield" id="starfield" aria-hidden="true"></canvas>
    <div class="backdrop-glow glow-a"></div>
    <div class="backdrop-glow glow-b"></div>
    <div class="js-site-header"></div>
    <main class="login-wrap page-block">
      <section class="login-card">
        <span class="section-kicker">Login</span>
        <h1>Access the forecast console</h1>
        <p>This is a mock login page for the standalone demo site.</p>
        <form class="login-form">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="name@company.com" required />
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password" required />
          <button type="submit" class="button button-primary">Continue to Dashboard</button>
        </form>
      </section>
    </main>
    <div class="js-site-footer"></div>
    <script src="./main.js"></script>
  </body>
</html>
